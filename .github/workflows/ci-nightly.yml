name: CI (Nightly)

on:
  schedule:
    - cron: '0 18 * * *' # UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # reg-keygen-git-hash-plugin needs full git history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 本番ビルド → vite preview で静的サーバー起動（ポート 4173）
      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for preview server
        run: npx --yes wait-on http://localhost:4173 --timeout 30000

      # Playwright フル（全ブラウザ・全テスト）
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright (full suite, all browsers)
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      # Storybook ビルド確認
      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      # ビジュアルリグレッション：Playwright でスクリーンショット取得 → reg-suit で比較
      - name: Take visual regression screenshots
        run: npx playwright test --grep "@visual" --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Inject S3 bucket name into regconfig
        run: |
          jq --arg bucket "$REG_SUIT_BUCKET_NAME" \
            '.plugins["reg-publish-s3-plugin"].bucketName = $bucket' \
            regconfig.json > tmp.json && mv tmp.json regconfig.json
        env:
          REG_SUIT_BUCKET_NAME: ${{ secrets.REG_SUIT_BUCKET_NAME }}

      - name: Run reg-suit
        run: npx reg-suit run
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload reg-suit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reg-suit-report
          path: frontend/.reg/
          retention-days: 30
